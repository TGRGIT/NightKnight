<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>NightKnight — AGP Report</title>
  <link rel="icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/report.css" />
</head>
<body>
  <div class="toolbar" id="toolbar">
    <span class="spacer" id="tb-range">Preparing report…</span>
    <button class="btn" id="tb-back" type="button">← Back to app</button>
    <button class="btn primary" id="tb-print" type="button">Print / Save as PDF</button>
  </div>

  <main class="sheet" id="sheet">
    <div class="status" id="status">Loading your glucose report…</div>
  </main>

  <script type="module" src="/report.js"></script>
</body>
</html>
