# XcodeGen spec for the NightKnight iOS app.
#   brew install xcodegen && cd ios && xcodegen generate && open NightKnight.xcodeproj
#
# We generate the project from this spec so the repo stays diff-friendly (no giant
# .pbxproj). iOS 17+ for Swift Charts + App Intents.
name: NightKnight
options:
  bundleIdPrefix: be.cooney.nightknight
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "" # set your Apple Developer team id

targets:
  NightKnight:
    type: application
    platform: iOS
    sources:
      - path: NightKnight
      - path: Shared
    info:
      path: NightKnight/Info.plist
      properties:
        CFBundleDisplayName: NightKnight
        UILaunchScreen: {}
        # Export compliance: the app uses only exempt encryption (HTTPS + standard
        # system crypto / Keychain — no custom or non-exempt encryption), so declare it
        # here and App Store Connect skips the export-compliance question on every
        # upload. Flip to true only if non-exempt encryption is ever added.
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: "NightKnight reads glucose from Apple Health to show and analyse it."
        NSHealthUpdateUsageDescription: "NightKnight writes glucose readings to Apple Health."
        # remote-notification: silent APNs wake for background refresh (docs/SILENT-PUSH.md).
        UIBackgroundModes: [fetch, processing, remote-notification]
        BGTaskSchedulerPermittedIdentifiers: [be.cooney.nightknight.refresh]
        # Allow http to localhost / local network (used for local dev against the server).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UISupportedInterfaceOrientations:
          [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown,
           UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
        UISupportedInterfaceOrientations~ipad:
          [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown,
           UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
        # CarPlay (Driving Task). We declare ONLY the CarPlay scene role and leave the
        # window role unspecified so the SwiftUI `WindowGroup` keeps managing the phone
        # window scene; UIKit instantiates `CarPlaySceneDelegate` for the head unit.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: NightKnight-CarPlay
                UISceneClassName: CPTemplateApplicationScene
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).CarPlaySceneDelegate
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: NightKnight/NightKnight.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: [health-records]
        com.apple.developer.healthkit.background-delivery: true
        com.apple.security.application-groups: [group.be.cooney.nightknight]
        keychain-access-groups: ["$(AppIdentifierPrefix)be.cooney.nightknight"]
        aps-environment: development
        # CarPlay Driving Task — granted by Apple (docs/REQUESTING-ENTITLEMENTS.md). The
        # simulator doesn't profile-validate entitlements, so the head unit connects
        # locally; a real device needs the matching provisioning profile.
        com.apple.developer.carplay-driving-task: true
    dependencies:
      - target: NightKnightWidget
      # Embed the watch app for a single App Store binary. link:false is essential —
      # otherwise Xcode tries to LINK the watchOS app into the iOS binary and compiles
      # the watch widget for iOS (breaking on watch-only families). embed:true copies
      # the watch app (built for watchOS) into NightKnight.app/Watch/.
      - target: NightKnightWatch
        embed: true
        link: false

  NightKnightWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: NightKnightWidget
      - path: Shared
    info:
      path: NightKnightWidget/Info.plist
      properties:
        CFBundleDisplayName: NightKnight
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        # MUST mirror the host app: without this, the widget's http requests to a
        # localhost/LAN dev server are blocked by App Transport Security while the
        # app's identical request succeeds — so the widget can never fetch and shows
        # only "--". (HTTPS is allowed regardless; this is for local/dev servers.)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        # An app extension's bundle id MUST be a child of the host app's id.
        PRODUCT_BUNDLE_IDENTIFIER: be.cooney.nightknight.NightKnight.Widget
    entitlements:
      path: NightKnightWidget/Widget.entitlements
      properties:
        com.apple.security.application-groups: [group.be.cooney.nightknight]
        keychain-access-groups: ["$(AppIdentifierPrefix)be.cooney.nightknight"]

  NightKnightWatch:
    type: application
    platform: watchOS
    sources:
      - path: NightKnightWatch
      - path: Shared
    info:
      path: NightKnightWatch/Info.plist
      properties:
        CFBundleDisplayName: NightKnight
        WKApplication: true
        WKCompanionAppBundleIdentifier: be.cooney.nightknight.NightKnight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: be.cooney.nightknight.NightKnight.watchkitapp
    entitlements:
      path: NightKnightWatch/Watch.entitlements
      properties:
        com.apple.security.application-groups: [group.be.cooney.nightknight]
        keychain-access-groups: ["$(AppIdentifierPrefix)be.cooney.nightknight"]
    dependencies:
      - target: NightKnightWatchWidget

  NightKnightWatchWidget:
    type: app-extension
    platform: watchOS
    sources:
      - path: NightKnightWatchWidget
      - path: Shared
    info:
      path: NightKnightWatchWidget/Info.plist
      properties:
        CFBundleDisplayName: NightKnight
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        # Same ATS parity as the iOS widget (the watch app already allows it).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: be.cooney.nightknight.NightKnight.watchkitapp.Widget
    entitlements:
      path: NightKnightWatchWidget/WatchWidget.entitlements
      properties:
        com.apple.security.application-groups: [group.be.cooney.nightknight]
        keychain-access-groups: ["$(AppIdentifierPrefix)be.cooney.nightknight"]

  NightKnightUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: NightKnightUITests
    dependencies:
      - target: NightKnight
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: NightKnight

  # Off-screen render tests for the iOS widget. Compiles the widget's view sources
  # (NOT WidgetBundle.swift / @main) + Shared directly, so it runs as a hostless
  # logic test — fast, no app/watch embedding required.
  NightKnightWidgetTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NightKnightWidgetTests
      - path: NightKnightWidget/NightKnightWidget.swift
      - path: Shared
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

  # Hostless logic tests for the CarPlay glance formatting. Compiles the pure
  # CarPlayGlance.swift (NOT the CarPlay-importing scene delegate) + Shared directly,
  # so it runs without an app host — same pattern as NightKnightWidgetTests.
  NightKnightCarPlayTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NightKnightCarPlayTests
      - path: NightKnight/CarPlayGlance.swift
      - path: Shared
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  NightKnight:
    build:
      targets:
        NightKnight: [run, test, profile, analyze, archive]
        NightKnightUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NightKnightUITests
  # Build ONLY the watch app (+ its widget dependency) — not the iOS app/widget.
  NightKnightWatch:
    build:
      targets:
        NightKnightWatch: [run, profile, analyze, archive]
    run:
      config: Debug
  # Hostless render tests for the iOS widget view.
  NightKnightWidgetTests:
    build:
      targets:
        NightKnightWidgetTests: [test]
    test:
      config: Debug
      targets:
        - NightKnightWidgetTests
  # Hostless logic tests for the CarPlay glance formatting.
  NightKnightCarPlayTests:
    build:
      targets:
        NightKnightCarPlayTests: [test]
    test:
      config: Debug
      targets:
        - NightKnightCarPlayTests
